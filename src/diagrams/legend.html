<!--
  Diagram Element: Legend
  Purpose:   Explain the symbology (colors, variants) used within a diagram.
  Responsibilities:
    - Pair a color swatch with a descriptive label for each Node variant used.
  Dependencies:
    - Legend component
    - Design Tokens
-->

<aside class="dds-legend" aria-label="Diagram legend">

  <div class="dds-legend__item">
    <span class="dds-legend__swatch bg-primary" aria-hidden="true"></span>
    <span><!-- PLACEHOLDER: Legend label --></span>
  </div>

  <div class="dds-legend__item">
    <span class="dds-legend__swatch bg-success" aria-hidden="true"></span>
    <span><!-- PLACEHOLDER: Legend label --></span>
  </div>

  <div class="dds-legend__item">
    <span class="dds-legend__swatch bg-warning" aria-hidden="true"></span>
    <span><!-- PLACEHOLDER: Legend label --></span>
  </div>

  <div class="dds-legend__item">
    <span class="dds-legend__swatch bg-error" aria-hidden="true"></span>
    <span><!-- PLACEHOLDER: Legend label --></span>
  </div>

</aside>
