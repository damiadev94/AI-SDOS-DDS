<!--
  Diagram Element: Label
  Purpose:   Display short text associated with a graphical element (node,
             connector, or region) within a diagram.
  Responsibilities:
    - Render legible text tied to a diagram element, in HTML or SVG context.
  Dependencies:
    - Design Tokens
-->

<!-- HTML label -->
<span class="dds-diagram-label-html"><!-- PLACEHOLDER: Label text -->Label</span>

<!-- SVG label -->
<svg aria-hidden="true" style="width: 160px; height: 32px;">
  <text x="0" y="16" class="dds-diagram-label"><!-- PLACEHOLDER: Label text -->Label</text>
</svg>
