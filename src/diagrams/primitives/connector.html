<!--
  Diagram Element: Connector
  Purpose:   Represent a relationship between two Nodes using an SVG line
             or path.
  Responsibilities:
    - Draw a straight, curved or dashed line between two points.
    - Terminate with an arrow marker when the relationship is directional.
  Non-responsibilities:
    - Compute node positions or routing — coordinates are provided manually.
  Dependencies:
    - Design Tokens
    - Arrow marker definitions (declared in the Canvas <defs>)
  Variants:
    - dds-connector--primary
    - dds-connector--dashed
-->

<svg class="dds-diagram__svg" aria-hidden="true" style="position: static; width: 100%; height: 140px;">
  <defs>
    <marker id="dds-arrow-default" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path class="dds-arrow" d="M0,0 L10,5 L0,10 z"></path>
    </marker>
  </defs>

  <!-- Default connector -->
  <path class="dds-connector" d="M20,20 L260,20" marker-end="url(#dds-arrow-default)"></path>

  <!-- Primary connector -->
  <path class="dds-connector dds-connector--primary" d="M20,70 L260,70" marker-end="url(#dds-arrow-default)"></path>

  <!-- Dashed connector -->
  <path class="dds-connector dds-connector--dashed" d="M20,120 L260,120"></path>
</svg>
