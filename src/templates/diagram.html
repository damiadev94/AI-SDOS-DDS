<body class="bg-default">

  <div class="dds-shell">

    <!-- Header -->
    <div class="dds-shell__header">
      <!-- SLOT: header component -->

    <!-- Hero — diagram title, type badge, and metadata -->

    <!-- Main — full-width for diagram canvas -->
    <div class="dds-shell__main">

        <main class="dds-main__content" role="main" id="main-content">

          <!--
            SLOT: Diagram canvas.

          -->

            <div class="dds-diagram__canvas">
              <!-- SLOT: diagram nodes (HTML elements) -->

              <svg class="dds-diagram__svg" aria-hidden="true">
                <defs>
                  <!-- SLOT: SVG arrow marker definitions -->
                </defs>
                <!-- SLOT: SVG connector paths -->
              </svg>
            </div>

          </div>

          <!-- Legend -->
          <div class="mt-lg">
            <!-- SLOT: legend component -->
          </div>

          <!-- Description / annotation -->
          <section id="diagram-description" class="mt-xl">
            <!-- SLOT: diagram description, decisions, notes -->

        </main>

      </div>
