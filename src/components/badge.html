<!--
  Component: Badge
  Purpose:   Compact inline label for status, category, or classification.
  Responsibilities:
    - Communicate a discrete state or category with color and text.
    - Remain legible at small sizes.
    - Support semantic color variants via modifier classes.
  Future Variants:
    - dds-badge--outline: transparent background with colored border.
    - dds-badge--dot: indicator dot with no label.
    - dds-badge--icon: includes an inline SVG icon.
    - dds-badge--large: increased padding for standalone use.
-->

<!-- Primary -->
<span class="dds-badge dds-badge--primary">Primary</span>

<!-- Success -->
<span class="dds-badge dds-badge--success">Success</span>

<!-- Warning -->
<span class="dds-badge dds-badge--warning">Warning</span>

<!-- Error -->
<span class="dds-badge dds-badge--error">Error</span>

<!-- Neutral -->
<span class="dds-badge dds-badge--neutral">Neutral</span>
