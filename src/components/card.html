<!--
  Component: Card
  Purpose:   General-purpose content container for documentation sections,
             feature descriptions, or grouped information blocks.
  Responsibilities:
    - Visually group related content with clear boundaries.
    - Support a title, body, and optional footer slot.
    - Maintain consistent padding and elevation.
  Future Variants:
    - dds-card--flat: no shadow, border only.
    - dds-card--highlighted: colored left border accent.
    - dds-card--interactive: hover elevation change.
    - dds-card--compact: reduced padding.
-->

<article class="dds-card">

  <header class="dds-card__header">
    <!-- PLACEHOLDER: Card title -->
    <h3 class="text-h4">Card Title</h3>
  </header>

  <div class="dds-card__body mt-sm">
    <!-- PLACEHOLDER: Card body content -->
    <p class="text-body text-secondary">Card description or content goes here.</p>
  </div>

  <footer class="dds-card__footer mt-md">
    <!-- PLACEHOLDER: Optional card footer (actions, metadata) -->
  </footer>

</article>
