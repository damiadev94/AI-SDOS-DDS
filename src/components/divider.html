<!--
  Component: Divider
  Purpose:   Visual separator between sections or content blocks.
  Responsibilities:
    - Provide a subtle horizontal line to separate content areas.
    - Support thickness variants for different visual weight needs.
    - Accept an optional label for named sections.
  Future Variants:
    - dds-divider--thick: bolder stroke weight.
    - dds-divider--labeled: centered text label within the line.
    - dds-divider--vertical: column separator inside flex layouts.
-->

<!-- Default divider -->
<hr class="dds-divider" role="separator" aria-hidden="true">

<!-- Thick divider -->
<hr class="dds-divider dds-divider--thick" role="separator" aria-hidden="true">
